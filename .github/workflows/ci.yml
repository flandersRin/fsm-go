name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: go test -count=1 -tags=integration ./test/integration/...
      - run: go test -run '^$' -bench BenchmarkRuntimeFire100K -benchtime=1x -benchmem ./test/benchmark
