name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: go test -tags=integration ./test/integration/...
