version: '3'

tasks:
  check:
    desc: Run local verification
    cmds:
      - task: fmt:check
      - task: tidy:check
      - task: vet
      - task: test
      - task: test:race
      - task: test:benchmark
      - task: perf

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run race detector
    cmds:
      - go test -race ./...

  test:benchmark:
    desc: Run benchmark once
    cmds:
      - go test -run '^$' -bench BenchmarkMemoryRuntimeStartAndRun -benchtime=1x -benchmem ./test/benchmark

  perf:
    desc: Run business performance script
    cmds:
      - go run ./scripts/perf --n 20000

  data:
    desc: Generate sample business data
    cmds:
      - go run ./scripts/generate-business-data --kind order --count 1000 --out business-data.jsonl

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:check:
    desc: Check go.mod and go.sum are tidy
    cmds:
      - |
        tmp="$(mktemp -d)"
        cp go.mod go.sum "$tmp"/
        go mod tidy
        diff -u "$tmp/go.mod" go.mod
        diff -u "$tmp/go.sum" go.sum

  fmt:check:
    desc: Check gofmt
    cmds:
      - test -z "$(gofmt -l .)"
